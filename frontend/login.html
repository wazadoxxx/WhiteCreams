<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css" />
    <title>Connexion | White Creams</title>
</head>

<body>
    <div class="ambient-shape ambient-shape-left" aria-hidden="true"></div>
    <div class="ambient-shape ambient-shape-right" aria-hidden="true"></div>

    <main class="login-shell">
        <section class="brand-side">
            <img src="assets/img/White_creams.png" alt="White Creams" class="brand-logo">
            <p class="brand-kicker">Espace membre</p>
            <h1>Bienvenue sur White Creams</h1>
            <p class="brand-copy">
                Connecte-toi pour gerer tes ventes, suivre tes casses et acceder a ton espace prive.
            </p>
        </section>

        <section class="form-side" aria-label="Formulaire de connexion">
            <h2>Connexion</h2>
            <p class="form-subtitle">Ravi de te revoir.</p>
            <p class="account-help">Si pas de compte, merci de contacter wazadox_x.</p>

            <form class="login-form" id="loginForm" action="#" method="post" novalidate>
                <label for="pseudo">pseudo</label>
                <input id="pseudo" name="pseudo" type="text" placeholder="Votre Pseudo" required>

                <label for="password">Mot de passe</label>
                <input id="password" name="password" type="password" placeholder="********" required>

                <div class="form-row">
                    <label class="check-wrap" for="remember">
                        <input id="remember" name="remember" type="checkbox">
                        <span>Se souvenir de moi</span>
                    </label>
                    <a href="#" class="helper-link">Mot de passe oublie ?</a>
                </div>

                <button type="submit" class="login-button" id="loginButton">Se connecter</button>
                <p class="login-message" id="loginMessage" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="assets/js/login.js"></script>
</body>

</html>
