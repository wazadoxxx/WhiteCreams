<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashBackFA | Accueil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
  <div class="grain" aria-hidden="true"></div>
  <header class="topbar">
    <a href="#" class="brand-wrap" aria-label="FlashBackFA accueil">
      <img src="assets/img/FlashBackFa.jpg" alt="Logo FlashBackFA" class="brand-logo" />
      <span class="brand-name">FlashBackFA</span>
    </a>

    <nav class="menu" aria-label="Navigation principale">
      <a href="index.html" class="menu-link is-active">Accueil</a>
      <a href="casses.html" class="menu-link">Casses</a>
      <a href="casses-equipe.html" class="menu-link">Armurie/Fleeca</a>
      <a href="payes.html" class="menu-link">Payes</a>
      <button id="logoutButton" class="logout-button" type="button">Deconnexion</button>
    </nav>
  </header>

  <main class="dashboard">
    <section class="hero">
      <p class="hero-kicker">Tableau de bord</p>
      <h1>Performance du joueur <span id="playerName"></span> <span id="playerGrade"
          class="grade-badge grade-member"></span></h1>
      <p class="hero-subtitle">Vue rapide de tes gains, ventes et activites recentes.</p>
    </section>

    <section class="stats-grid" aria-label="Statistiques joueur">
      <article class="stat-card">
        <p class="stat-label">Argent total genere</p>
        <p class="stat-value" id="totalMoney">$0</p>
      </article>

      <article class="stat-card">
        <p class="stat-label">Drogues vendues</p>
        <p class="stat-value" id="totalDrugs">0</p>
      </article>

      <article class="stat-card">
        <p class="stat-label">Nombre de casses</p>
        <p class="stat-value" id="totalHeists">0</p>
      </article>
    </section>

    <section class="table-section" aria-label="Derniers casses">
      <div class="section-head">
        <h2>3 casses les plus recentes</h2>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Dates</th>
              <th>Type d'activite</th>
              <th>Quantite</th>
              <th>Gain</th>
            </tr>
          </thead>
          <tbody id="recentHeistsBody"></tbody>
        </table>
      </div>
    </section>
  </main>


  <script src="assets/js/main.js"></script>
</body>

</html>
